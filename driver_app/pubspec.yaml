name: driver_app
description: AI-Powered Driver Monitoring System

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.0
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.11.0
  audioplayers: ^5.0.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  intl: ^0.19.0
  wakelock_plus: ^1.5.1
  kiosk_mode: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/

